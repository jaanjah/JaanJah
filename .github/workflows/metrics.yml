name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:

# Default-deny: jobs must opt in to any GITHUB_TOKEN permission they need
permissions: {}

# Serialize runs so scheduled and manual runs never race on the SVG commit
concurrency:
  group: metrics
  cancel-in-progress: false

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # required: the action commits the regenerated SVG
    steps:
      - name: Profile metrics
        # Pinned to an immutable commit SHA (v3.34) to prevent supply-chain
        # tag-hijack; bump the SHA + comment together when upgrading.
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
